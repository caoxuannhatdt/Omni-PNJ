<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang Cập Nhật | Omni-Growth Workspace</title>
    <link rel="icon" href="/Icon.png" type="image/png">

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #334155;
        }

        .update-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .update-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px -10px rgba(0, 45, 114, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .update-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #002d72, #F7A800, #002d72);
            background-size: 200% auto;
            animation: gradient-shift 3s linear infinite;
        }

        @keyframes gradient-shift {
            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #002d72 0%, #0045a5 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: white;
            font-size: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 45, 114, 0.3);
            animation: float-icon 3s ease-in-out infinite;
        }

        @keyframes float-icon {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            color: #002d72;
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 12px;
        }

        p.desc {
            color: #64748b;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .progress-bar-bg {
            background: #e2e8f0;
            height: 6px;
            border-radius: 3px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 32px;
        }

        .progress-bar-fill {
            background: #F7A800;
            height: 100%;
            width: 30%;
            border-radius: 3px;
            animation: load-progress 2s ease-out forwards;
        }

        @keyframes load-progress {
            0% {
                width: 0%;
            }

            100% {
                width: 45%;
            }
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: #ffffff;
            color: #002d72;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-back:hover {
            border-color: #002d72;
            color: #002d72;
            background: #f8fafc;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>

    <!-- Load App Shell Components -->
    <script type="module" src="/components/layout.js"></script>

    <div class="update-container">
        <div class="update-card">
            <div class="icon-wrapper">
                <i class="fas fa-tools"></i>
            </div>
            <h1>Dữ liệu đang được đồng bộ</h1>
            <p class="desc">Tính năng này đang trong quá trình nâng cấp và tích hợp dữ liệu mới. Vui lòng quay lại sau.
            </p>

            <div class="progress-bar-bg">
                <div class="progress-bar-fill"></div>
            </div>

            <a href="/index.html" class="btn-back">
                <i class="fas fa-arrow-left"></i> Quay lại Trang chủ
            </a>
        </div>
    </div>

</body>

</html>
